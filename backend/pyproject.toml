[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  ".pytest_cache",
  "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = [
  "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
