services:
  - type: web
    name: gate-os-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: gate_study_os
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMERGENT_OAUTH_URL
        value: https://auth.emergentagent.com
      - key: ADMIN_EMAILS
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
